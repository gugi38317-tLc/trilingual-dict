<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한·영·일 사전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="data/general.js"></script>
<script src="data/bible.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f14; font-family: 'Inter', 'Noto Sans KR', sans-serif; color: #e8e6f0; min-height: 100vh; }
.app { display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }
.header { text-align: center; margin-bottom: 2rem; }
.logo { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: #7c6fcd; margin-bottom: 0.4rem; }
.title { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; margin-bottom: 0.3rem; }
.subtitle { font-size: 0.85rem; color: #6b6880; }
.mode-toggle { display: flex; gap: 0; background: #1a1a24; border: 1px solid #2e2b40; border-radius: 12px; padding: 4px; margin-bottom: 0.5rem; }
.mode-btn { padding: 0.5rem 1.2rem; border: none; border-radius: 9px; font-size: 0.85rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.2s; background: transparent; color: #6b6880; font-weight: 500; }
.mode-btn.active { background: linear-gradient(135deg, #7c6fcd, #5b8dee); color: #fff; }
.mode-label { font-size: 0.7rem; color: #4a475a; text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
.mode-label span { color: #7c6fcd; }
.search-box { width: 100%; max-width: 600px; display: flex; gap: 0.75rem; margin-bottom: 1rem; }
.search-input { flex: 1; background: #1a1a24; border: 1.5px solid #2e2b40; border-radius: 12px; padding: 0.85rem 1.25rem; font-size: 1.05rem; color: #e8e6f0; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: #7c6fcd; }
.search-input::placeholder { color: #4a475a; }
.search-btn { background: linear-gradient(135deg, #7c6fcd, #5b8dee); border: none; border-radius: 12px; padding: 0.85rem 1.5rem; font-size: 1rem; color: #fff; cursor: pointer; font-weight: 600; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
.search-btn:hover { opacity: 0.9; }
.search-btn:active { transform: scale(0.97); }
.chips { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 1.75rem; justify-content: center; max-width: 600px; width: 100%; }
.chip { background: #1a1a24; border: 1px solid #2e2b40; border-radius: 20px; padding: 0.28rem 0.85rem; font-size: 0.82rem; color: #9d9ab5; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
.chip:hover { border-color: #7c6fcd; color: #c4b5fd; background: #1e1c2e; }
.error { color: #f87171; background: #1f1010; border: 1px solid #7f1d1d; border-radius: 10px; padding: 0.75rem 1.25rem; margin-bottom: 1.5rem; font-size: 0.9rem; max-width: 600px; width: 100%; }
.tabs { display: flex; gap: 0; background: #1a1a24; border: 1px solid #2e2b40; border-radius: 10px; padding: 3px; margin-bottom: 1.5rem; width: 100%; max-width: 600px; }
.tab-btn { flex: 1; padding: 0.5rem; border: none; border-radius: 8px; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; background: transparent; color: #6b6880; transition: all 0.2s; }
.tab-btn.active { background: #22222e; color: #e8e6f0; }

/* ── リスト形式 ── */
.result-list { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 0.5rem; }

.result-item { background: #16161f; border: 1px solid #22222e; border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; animation: fadeIn 0.25s ease; }
.result-item:hover { border-color: #3a3750; }
.result-item.open { border-color: #7c6fcd; }

.result-row { display: flex; align-items: center; padding: 0.85rem 1rem; gap: 0.75rem; }
.result-ko { font-size: 1.05rem; font-weight: 700; color: #f0eeff; font-family: 'Noto Sans KR', sans-serif; }
.result-langs { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; min-width: 0; }
.result-ja { font-size: 0.9rem; color: #34d399; font-family: 'Noto Serif JP', serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-en { font-size: 0.82rem; color: #60a5fa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-meaning { font-size: 0.75rem; color: #6b6880; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; flex-shrink: 0; }
.result-arrow { color: #4a475a; font-size: 0.75rem; transition: transform 0.2s; }
.result-item.open .result-arrow { transform: rotate(180deg); }
.bm-inline { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0; }

/* ── 詳細展開パネル ── */
.detail-panel { display: none; border-top: 1px solid #22222e; padding: 1rem; background: #13131b; }
.result-item.open .detail-panel { display: block; }

.detail-grid { display: flex; flex-direction: column; gap: 0.75rem; }
.detail-lang { background: #16161f; border-radius: 10px; padding: 0.85rem 1rem; }
.detail-lang.korean { border-left: 3px solid #f472b6; }
.detail-lang.english { border-left: 3px solid #60a5fa; }
.detail-lang.japanese { border-left: 3px solid #34d399; }
.detail-header { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
.detail-flag { font-size: 1rem; }
.detail-lang-name { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #6b6880; }
.detail-pos { margin-left: auto; font-size: 0.65rem; background: #1e1c2e; border: 1px solid #2e2b40; color: #9d9ab5; border-radius: 5px; padding: 0.1rem 0.4rem; }
.detail-word { font-size: 1.3rem; font-weight: 700; color: #f0eeff; font-family: 'Noto Serif JP', 'Noto Sans KR', serif; margin-bottom: 0.15rem; }
.detail-reading { font-size: 0.78rem; color: #7c6fcd; margin-bottom: 0.5rem; }
.detail-defs { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.detail-def { font-size: 0.8rem; color: #c4c0d4; background: #1a1a28; border-radius: 6px; padding: 0.2rem 0.55rem; }

/* ── ブックマーク ── */
.bookmarks-panel { width: 100%; max-width: 600px; }
.bookmarks-empty { text-align: center; color: #4a475a; font-size: 0.9rem; padding: 3rem 0; }
.bookmark-list { display: flex; flex-direction: column; gap: 0.5rem; }
.bookmark-card { background: #16161f; border: 1px solid #22222e; border-radius: 12px; padding: 0.85rem 1rem; cursor: pointer; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
.bookmark-card:hover { border-color: #7c6fcd; }
.bookmark-word { font-size: 1rem; font-weight: 600; color: #f0eeff; font-family: 'Noto Sans KR', sans-serif; }
.bookmark-sub { font-size: 0.75rem; color: #6b6880; margin-top: 2px; }
.bookmark-del { background: none; border: none; cursor: pointer; color: #4a475a; font-size: 0.9rem; padding: 4px; transition: color 0.15s; }
.bookmark-del:hover { color: #f87171; }
.bookmark-mode-badge { font-size: 0.65rem; background: #1e1c2e; border: 1px solid #2e2b40; color: #7c6fcd; border-radius: 4px; padding: 1px 6px; margin-left: 6px; }

/* ── 履歴 ── */
.history { width: 100%; max-width: 600px; margin-top: 2rem; }
.history-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: #4a475a; margin-bottom: 0.6rem; }
.history-chips { display: flex; flex-wrap: wrap; gap: 0.45rem; }
.history-chip { background: #1a1a24; border: 1px solid #2e2b40; border-radius: 8px; padding: 0.3rem 0.8rem; font-size: 0.82rem; color: #9d9ab5; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
.history-chip:hover { border-color: #7c6fcd; color: #c4b5fd; }

.grade-badge { font-size: 0.65rem; background: #1e2e1e; border: 1px solid #2e402e; color: #6db56d; border-radius: 5px; padding: 0.1rem 0.4rem; margin-left: 4px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 480px) {
  .mode-btn { padding: 0.45rem 0.8rem; font-size: 0.78rem; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">韓・英・日 사전</div>
    <h1 class="title">한·영·일 사전</h1>
    <p class="subtitle">한국어로 검색 → 영어·일본어 동시 표시</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('general')" id="btn-general">📖 일반 용어</button>
    <button class="mode-btn" onclick="setMode('bible')" id="btn-bible">✝️ 성경 용어</button>
  </div>
  <div class="mode-label" id="mode-label"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('search')" id="tab-search">🔍 검색</button>
    <button class="tab-btn" onclick="setTab('bookmarks')" id="tab-bookmarks">⭐ 즐겨찾기 (<span id="bm-count">0</span>)</button>
  </div>

  <!-- 검색 탭 -->
  <div id="panel-search" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="search-box">
      <input class="search-input" id="search-input" type="text" placeholder="한국어로 검색..." autocomplete="off" onkeydown="if(event.key==='Enter')search()">
      <button class="search-btn" onclick="search()">검색</button>
    </div>
    <div class="chips" id="chips"></div>
    <div id="error" class="error" style="display:none;max-width:600px;width:100%;"></div>
    <div class="result-list" id="result-list"></div>
    <div class="history" id="history-section" style="display:none;">
      <div class="history-label">최근 검색</div>
      <div class="history-chips" id="history-chips"></div>
    </div>
  </div>

  <!-- 즐겨찾기 탭 -->
  <div id="panel-bookmarks" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
    <div class="bookmarks-panel">
      <div id="bookmarks-content"></div>
    </div>
  </div>
</div>

<script>
let currentMode = 'general';
let currentTab  = 'search';
let bookmarks   = JSON.parse(localStorage.getItem('bm') || '[]');
let searchHistory = [];
let openItem = null; // 現在開いているアイテムのko

function init() {
  updateModeLabel();
  renderChips();
  updateBmCount();
}

function updateModeLabel() {
  const dict = window.DICT && window.DICT[currentMode];
  const count = dict ? dict.length : 0;
  const label = currentMode === 'general' ? '일반 용어' : '성경 용어';
  document.getElementById('mode-label').innerHTML =
    `현재: <span>${label}</span> · 수록 단어: <span>${count.toLocaleString()}개</span>`;
}

function renderChips() {
  const sampleWords = {
    general: ['사랑','집','학교','먹다','크다','가다','물','하늘','친구','시간'],
    bible:   ['구원','믿음','예수','기도','십자가','성경','천국','복음','은혜','사랑']
  };
  const chips = document.getElementById('chips');
  chips.innerHTML = (sampleWords[currentMode] || [])
    .map(w => `<span class="chip" onclick="quickSearch('${w}')">${w}</span>`)
    .join('');
}

function setMode(mode) {
  currentMode = mode;
  openItem = null;
  document.getElementById('btn-general').classList.toggle('active', mode === 'general');
  document.getElementById('btn-bible').classList.toggle('active', mode === 'bible');
  updateModeLabel();
  renderChips();
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('error').style.display = 'none';
  document.getElementById('search-input').value = '';
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-bookmarks').classList.toggle('active', tab === 'bookmarks');
  document.getElementById('panel-search').style.display    = tab === 'search'    ? 'flex' : 'none';
  document.getElementById('panel-bookmarks').style.display = tab === 'bookmarks' ? 'flex' : 'none';
  if (tab === 'bookmarks') renderBookmarks();
}

function search() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const dict = window.DICT && window.DICT[currentMode];
  if (!dict) { showError('사전 데이터를 불러오지 못했습니다.'); return; }
  hideError();
  openItem = null;
  const exact   = dict.filter(e => e.ko === query);
  const partial = dict.filter(e => e.ko !== query && e.ko.includes(query));
  const results = [...exact, ...partial].slice(0, 30);
  if (results.length === 0) {
    showError(`"${query}"에 대한 결과가 없습니다.`);
    document.getElementById('result-list').innerHTML = '';
    return;
  }
  renderResults(results);
  addHistory(query);
}

function quickSearch(word) {
  document.getElementById('search-input').value = word;
  search();
}

function renderResults(results) {
  const container = document.getElementById('result-list');
  container.innerHTML = '';
  results.forEach(entry => {
    const ja = entry.ja || {};
    const en = entry.en || {};
    const bm = bookmarks.find(b => b.ko === entry.ko && b.mode === currentMode);
    const koSafe = entry.ko.replace(/'/g, "\\'");

    // 簡単な意味（ja.dの最初）
    const meaning = ja.d && ja.d.length ? ja.d[0] : '';

    const item = document.createElement('div');
    item.className = 'result-item';
    item.dataset.ko = entry.ko;

    item.innerHTML = `
      <div class="result-row" onclick="toggleDetail('${koSafe}')">
        <span class="result-ko">${entry.ko}</span>
        <div class="result-langs">
          <span class="result-ja">🇯🇵 ${ja.w || '-'}</span>
          <span class="result-en">🇺🇸 ${en.w || '-'}</span>
          ${meaning ? `<span class="result-meaning">・${meaning}</span>` : ''}
        </div>
        <div class="result-right">
          <button class="bm-inline" onclick="event.stopPropagation();toggleBookmark('${koSafe}')">${bm ? '⭐' : '☆'}</button>
          <span class="result-arrow">▼</span>
        </div>
      </div>
      <div class="detail-panel">
        <div class="detail-grid">
          <!-- 韓国語 -->
          <div class="detail-lang korean">
            <div class="detail-header">
              <span class="detail-flag">🇰🇷</span>
              <span class="detail-lang-name">한국어</span>
              ${entry.ko_grade ? `<span class="grade-badge">${entry.ko_grade}등급</span>` : ''}
            </div>
            <div class="detail-word">${entry.ko}</div>
            ${entry.ko_d && entry.ko_d.length ? `
              <div class="detail-defs">
                ${entry.ko_d.map(d => `<span class="detail-def">${d}</span>`).join('')}
              </div>` : ''}
          </div>
          <!-- 日本語 -->
          <div class="detail-lang japanese">
            <div class="detail-header">
              <span class="detail-flag">🇯🇵</span>
              <span class="detail-lang-name">日本語</span>
              ${ja.pos ? `<span class="detail-pos">${ja.pos}</span>` : ''}
            </div>
            <div class="detail-word">${ja.w || '-'}</div>
            ${ja.r ? `<div class="detail-reading">${ja.r}</div>` : ''}
            ${ja.d && ja.d.length ? `
              <div class="detail-defs">
                ${ja.d.map(d => `<span class="detail-def">${d}</span>`).join('')}
              </div>` : ''}
          </div>
          <!-- 英語 -->
          <div class="detail-lang english">
            <div class="detail-header">
              <span class="detail-flag">🇺🇸</span>
              <span class="detail-lang-name">English</span>
              ${en.pos ? `<span class="detail-pos">${en.pos}</span>` : ''}
            </div>
            <div class="detail-word">${en.w || '-'}</div>
            ${en.d && en.d.length ? `
              <div class="detail-defs">
                ${en.d.slice(0,3).map(d => `<span class="detail-def">${d}</span>`).join('')}
              </div>` : ''}
          </div>
        </div>
      </div>
    `;
    container.appendChild(item);
  });
}

function toggleDetail(ko) {
  const items = document.querySelectorAll('.result-item');
  items.forEach(item => {
    if (item.dataset.ko === ko) {
      const isOpen = item.classList.contains('open');
      item.classList.toggle('open', !isOpen);
      openItem = isOpen ? null : ko;
    } else {
      item.classList.remove('open');
    }
  });
}

// ── ブックマーク ──
function toggleBookmark(ko) {
  const dict = window.DICT && window.DICT[currentMode];
  const entry = dict && dict.find(e => e.ko === ko);
  if (!entry) return;
  const idx = bookmarks.findIndex(b => b.ko === ko && b.mode === currentMode);
  if (idx >= 0) {
    bookmarks.splice(idx, 1);
  } else {
    bookmarks.push({ ko, mode: currentMode, en: entry.en?.w || '', ja: entry.ja?.w || '' });
  }
  localStorage.setItem('bm', JSON.stringify(bookmarks));
  updateBmCount();
  // ボタンだけ更新
  document.querySelectorAll('.result-item').forEach(item => {
    if (item.dataset.ko === ko) {
      const btn = item.querySelector('.bm-inline');
      if (btn) btn.textContent = bookmarks.find(b => b.ko === ko && b.mode === currentMode) ? '⭐' : '☆';
    }
  });
}

function updateBmCount() {
  document.getElementById('bm-count').textContent = bookmarks.length;
}

function renderBookmarks() {
  const content = document.getElementById('bookmarks-content');
  if (bookmarks.length === 0) {
    content.innerHTML = '<div class="bookmarks-empty">즐겨찾기가 없습니다.<br>검색 결과에서 ☆를 눌러 추가하세요.</div>';
    return;
  }
  content.innerHTML = `<div class="bookmark-list">
    ${bookmarks.map(b => `
      <div class="bookmark-card" onclick="loadBookmark('${b.ko.replace(/'/g,"\\'")}','${b.mode}')">
        <div>
          <div class="bookmark-word">
            ${b.ko}
            <span class="bookmark-mode-badge">${b.mode === 'bible' ? '성경' : '일반'}</span>
          </div>
          <div class="bookmark-sub">${b.ja || ''} ${b.en ? '· ' + b.en : ''}</div>
        </div>
        <button class="bookmark-del" onclick="event.stopPropagation();delBookmark('${b.ko.replace(/'/g,"\\'")}','${b.mode}')">✕</button>
      </div>`).join('')}
  </div>`;
}

function loadBookmark(ko, mode) {
  setMode(mode);
  setTab('search');
  document.getElementById('search-input').value = ko;
  search();
}

function delBookmark(ko, mode) {
  bookmarks = bookmarks.filter(b => !(b.ko === ko && b.mode === mode));
  localStorage.setItem('bm', JSON.stringify(bookmarks));
  updateBmCount();
  renderBookmarks();
}

// ── 履歴 ──
function addHistory(word) {
  searchHistory = [word, ...searchHistory.filter(h => h !== word)].slice(0, 8);
  const sec   = document.getElementById('history-section');
  const chips = document.getElementById('history-chips');
  sec.style.display = '';
  chips.innerHTML = searchHistory.map(h =>
    `<button class="history-chip" onclick="quickSearch('${h}')">${h}</button>`
  ).join('');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = '';
}
function hideError() {
  document.getElementById('error').style.display = 'none';
}

init();
</script>
</body>
</html>
